services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: monitor_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       monitor
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: admin123
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [monitor_net]

  # ─── Backend Spring Boot ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monitor_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL:      jdbc:postgresql://db:5432/monitor
      DB_USER:     postgres
      DB_PASS:     admin123
      JWT_SECRET:  minha-chave-secreta-super-segura-monitor-dashboard-2024
      CORS_ORIGINS: http://localhost:5173,http://localhost:80,http://frontend
      PORT:        8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL","wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    networks: [monitor_net]

  # ─── Frontend React ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: monitor_ui
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    networks: [monitor_net]

volumes:
  pg_data:

networks:
  monitor_net:
    driver: bridge
